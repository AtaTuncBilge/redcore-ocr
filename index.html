<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>redcore-ocr</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2.5">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script>
    // Client-side deterrent only; cannot truly block DevTools.
    (function () {
      document.addEventListener('contextmenu', function (event) {
        event.preventDefault();
      });

      document.addEventListener('keydown', function (event) {
        const key = String(event.key || '').toLowerCase();
        const blocked = key === 'f12'
          || (event.ctrlKey && event.shiftKey && (key === 'i' || key === 'j' || key === 'c'))
          || (event.ctrlKey && key === 'u');
        if (blocked) {
          event.preventDefault();
          event.stopPropagation();
          return false;
        }
      }, true);

      setInterval(function () {
        try { console.clear(); } catch (_err) {}
      }, 800);
    }());
  </script>
</head>
<body>
  <div id="root"></div>
  <script src="app-react.js?v=2.5" defer></script>
  <script src="ocr-core.js?v=2.5" defer></script>
  <script src="app.js?v=2.5" defer></script>
</body>
</html>
